{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">
  <h5 class="mb-1 fw-semibold">Edit Account — {{ account.name }}</h5>
  <hr class="mt-1 mb-3"
      style="border-color:#ffc107;border-width:2px;width:60px;opacity:1;">

  <div class="card p-4" style="max-width:600px;">

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Name</label>
        <input type="text" name="name" class="form-control"
               value="{{ account.name }}" required
               style="text-transform:uppercase;">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Code</label>
        <input type="text" name="code" class="form-control"
               value="{{ account.code|default:'' }}">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Type</label>
        <select name="account_type" class="form-select">
          <option value="asset"
            {% if account.account_type == "asset" %}selected{% endif %}>
            Asset
          </option>
          <option value="liability"
            {% if account.account_type == "liability" %}selected{% endif %}>
            Liability
          </option>
          <option value="equity"
            {% if account.account_type == "equity" %}selected{% endif %}>
            Equity
          </option>
          <option value="income"
            {% if account.account_type == "income" %}selected{% endif %}>
            Income
          </option>
          <option value="expense"
            {% if account.account_type == "expense" %}selected{% endif %}>
            Expense
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Group</label>
        <select name="group_id" class="form-select">
          <option value="">— No Group —</option>
          {% for g in groups %}
            <option value="{{ g.id }}"
              {% if account.group.id == g.id %}selected{% endif %}>
              {{ g.code|default:"—" }} — {{ g.name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">
          Opening Balance (PKR)
        </label>
        <input type="number" step="0.01" name="opening_balance"
               class="form-control"
               value="{{ account.opening_balance }}">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Description</label>
        <textarea name="description" class="form-control" rows="2">
{{ account.description|default:'' }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning px-4">
          Update Account
        </button>
        <a href="{% url 'chart_of_accounts' %}"
           class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
