{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">
  <h5 class="mb-1 fw-semibold">Edit Voucher Type — {{ vtype.name }}</h5>
  <hr class="mt-1 mb-3"
      style="border-color:#ffc107;border-width:2px;width:60px;opacity:1;">

  <div class="card p-4" style="max-width:500px;">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">Voucher Name</label>
        <input type="text" name="name" class="form-control"
               value="{{ vtype.name }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Voucher Code</label>
        <input type="text" name="code" class="form-control"
               value="{{ vtype.code }}"
               style="text-transform:uppercase;"
               maxlength="10" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Payment Type</label>
        <select name="payment_type" class="form-select">
          <option value="cash"
            {% if vtype.payment_type == "cash" %}selected{% endif %}>
            Cash
          </option>
          <option value="bank"
            {% if vtype.payment_type == "bank" %}selected{% endif %}>
            Bank
          </option>
          <option value="both"
            {% if vtype.payment_type == "both" %}selected{% endif %}>
            Both
          </option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning px-4">
          Update Voucher Type
        </button>
        <a href="{% url 'voucher_type_list' %}"
           class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
