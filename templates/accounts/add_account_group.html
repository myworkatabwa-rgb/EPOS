{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">
  <h5 class="mb-1 fw-semibold">Add Account Group</h5>
  <hr class="mt-1 mb-3"
      style="border-color:#0d6efd;border-width:2px;width:60px;opacity:1;">

  <div class="card p-4" style="max-width:600px;">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">
          Group Name <span class="text-danger">*</span>
        </label>
        <input type="text" name="name" class="form-control"
               placeholder="e.g. FIXED ASSETS" required
               style="text-transform:uppercase;">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Account Code</label>
        <input type="text" name="code" class="form-control"
               placeholder="e.g. 01-001">
        <small class="text-muted">
          Leave blank to auto-assign. Use format: 01, 01-001, 01-001-001
        </small>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Parent Group</label>
        <select name="parent_id" class="form-select">
          <option value="">— No Parent (Top Level) —</option>
          {% for g in groups %}
            <option value="{{ g.id }}">
              {{ g.code|default:"—" }} — {{ g.name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          Save Group
        </button>
        <a href="{% url 'chart_of_accounts' %}"
           class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
