{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">

  <h5 class="mb-1 fw-semibold">Add Category</h5>
  <hr class="mt-1 mb-3" style="border-color:#0d6efd; border-width:2px; width:60px; opacity:1;">

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  <div class="card p-4">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- ROW 1: Category Code + Category Name -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Category Code</label>
          <input type="text" class="form-control bg-light"
                 value="{{ next_code }}" readonly>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input type="text" name="name" class="form-control"
                 placeholder="Category" required>
        </div>
      </div>

      <!-- ROW 2: Display on Branches + Days -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Display on Branches</label>
          <input type="text" name="display_on_branches" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Days</label>
          <input type="text" name="days" class="form-control">
        </div>
      </div>

      <!-- ROW 3: Start Time + End Time -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Start Time</label>
          <input type="time" name="start_time" id="startTime" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">End Time</label>
          <div class="d-flex gap-2">
            <input type="time" name="end_time" id="endTime" class="form-control">
            <button type="button" class="btn btn-primary"
                    onclick="clearTime()">Clear Time</button>
          </div>
        </div>
      </div>

      <!-- ROW 4: Image Upload -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Upload Category Image</label>
          <input type="file" name="image" class="form-control" accept="image/*"
                 onchange="previewImage(this)">
        </div>
        <div class="col-md-6 d-flex align-items-center">
          <img id="imagePreview"
               src="{% static 'media/placeholder.png' %}"
               height="80"
               style="border:1px dashed #ccc; border-radius:6px; padding:4px; display:none;">
        </div>
      </div>

      <!-- ROW 5: Checkboxes -->
      <div class="row mb-4">
        <div class="col-12 d-flex flex-wrap gap-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox"
                   name="display_on_pos" id="displayOnPos" checked>
            <label class="form-check-label" for="displayOnPos">Display On Pos</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox"
                   name="get_tax_from_item" id="getTax">
            <label class="form-check-label" for="getTax">Get Tax From Item</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox"
                   name="editable_sale_rate" id="editableSaleRate">
            <label class="form-check-label" for="editableSaleRate">Editable Sale Rate</label>
          </div>
        </div>
      </div>

      <!-- SUBMIT -->
      <div class="row">
        <div class="col-md-3">
          <button type="submit" class="btn btn-primary w-100">Add</button>
        </div>
      </div>

    </form>
  </div>

</div>

<script>
function clearTime() {
  document.getElementById("startTime").value = "";
  document.getElementById("endTime").value   = "";
}

function previewImage(input) {
  const preview = document.getElementById("imagePreview");
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>

{% endblock %}
