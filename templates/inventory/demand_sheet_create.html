{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">

  <h5 class="mb-1 fw-semibold">Demand Sheet</h5>
  <hr class="mt-1 mb-3" style="border-color:#0d6efd; border-width:2px; width:60px; opacity:1;">

  <div class="card p-4">

    <!-- ROW 1 -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">Branch</label>
        <input type="text" class="form-control bg-light" value="Main Branch" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Demand No</label>
        <input type="text" class="form-control bg-light" value="{{ demand_no }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Demand Date</label>
        <input type="text" class="form-control bg-light" value="{{ today }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Description</label>
        <textarea id="description" class="form-control" rows="2"
                  placeholder="Description"></textarea>
      </div>
    </div>

    <!-- ROW 2 -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">From Date</label>
        <input type="date" id="fromDate" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">To Date</label>
        <input type="date" id="toDate" class="form-control">
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadConsumption()">
          Load Consumption
        </button>
      </div>
    </div>

    <!-- ROW 3: Category + SubCategory + Load Item -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">Category</label>
        <select id="categorySelect" class="form-select"
                onchange="loadSubcategoriesForDemand()">
          <option value="">Please select</option>
          {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">SubCategory</label>
        <select id="subcategorySelect" class="form-select">
          <option value="">Please select</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadItemsByCategory()">
          Load Item
        </button>
      </div>
    </div>

    <!-- ROW 4: Excel -->
    <div class="row mb-4">
      <div class="col-md-3">
        <label class="form-label">Choose Excel File</label>
        <input type="file" id="excelFile" class="form-control" accept=".xlsx,.xls">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100">Load Records</button>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-info w-100" onclick="downloadSample()">
          Download Sample file
        </button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-responsive mb-3">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>BarCode</th>
            <th>Item Name</th>
            <th>Item Unit</th>
            <th>Requested Qty</th>
            <th>Available Stock</th>
            <th>Consumption</th>
            <th>Remarks</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="demandItemsBody">
          <tr id="emptyRow">
            <td colspan="8" class="text-center text-muted py-3">
              No items loaded yet.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- BUTTONS -->
    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-secondary" onclick="addEmptyRow()">Add More</button>
      <button class="btn btn-primary" onclick="loadAllItems()">Load All Items</button>
    </div>

    <div>
      <button class="btn btn-primary px-5" onclick="saveDemand()">Save</button>
    </div>

  </div>
</div>


<script>
let demandItems = [];

function loadSubcategoriesForDemand() {
  const catId = document.getElementById("categorySelect").value;
  const subSel = document.getElementById("subcategorySelect");
  subSel.innerHTML = '<option value="">Please select</option>';
  if (!catId) return;

  fetch(`/inventory/load-subcategories/?category_id=${catId}`)
    .then(r => r.json())
    .then(data => {
      data.forEach(s => {
        subSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
      });
    });
}

function loadItemsByCategory() {
  const catId = document.getElementById("categorySelect").value;
  const subId = document.getElementById("subcategorySelect").value;

  if (!catId) { alert("Please select a category."); return; }

  let url = `/inventory/load-products/?category_id=${catId}`;
  if (subId) url += `&subcategory_id=${subId}`;

  fetch(url)
    .then(r => r.json())
    .then(products => {
      products.forEach(p => {
        const exists = demandItems.find(i => i.product_id === p.id);
        if (!exists) {
          demandItems.push({
            product_id:     p.id,
            sku:            p.sku,
            name:           p.name,
            unit:           p.unit,
            requested_qty:  0,
            available_stock: p.stock,
            consumption:    0,
            remarks:        "",
          });
        }
      });
      renderTable();
    });
}

function loadAllItems() {
  fetch(`/inventory/load-products/?category_id=all`)
    .then(r => r.json())
    .then(products => {
      products.forEach(p => {
        const exists = demandItems.find(i => i.product_id === p.id);
        if (!exists) {
          demandItems.push({
            product_id:      p.id,
            sku:             p.sku,
            name:            p.name,
            unit:            p.unit,
            requested_qty:   0,
            available_stock: p.stock,
            consumption:     0,
            remarks:         "",
          });
        }
      });
      renderTable();
    });
}

function loadConsumption() {
  const fromDate = document.getElementById("fromDate").value;
  const toDate   = document.getElementById("toDate").value;

  if (!fromDate || !toDate) {
    alert("Please select both From Date and To Date.");
    return;
  }

  fetch(`/inventory/load-consumption/?from_date=${fromDate}&to_date=${toDate}`)
    .then(r => r.json())
    .then(data => {
      if (data.length === 0) {
        alert("No consumption data found for this date range.");
        return;
      }

      data.forEach(c => {
        const existing = demandItems.find(i => i.product_id === c.product_id);
        if (existing) {
          existing.consumption = c.consumption;
        } else {
          demandItems.push({
            product_id:      c.product_id,
            sku:             c.sku,
            name:            c.name,
            unit:            "Default",
            requested_qty:   0,
            available_stock: 0,
            consumption:     c.consumption,
            remarks:         "",
          });
        }
      });
      renderTable();
    });
}

function addEmptyRow() {
  demandItems.push({
    product_id: null, sku: "", name: "",
    unit: "Default", requested_qty: 0,
    available_stock: 0, consumption: 0, remarks: "",
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("demandItemsBody");
  tbody.innerHTML = "";

  if (demandItems.length === 0) {
    tbody.innerHTML = `<tr id="emptyRow">
      <td colspan="8" class="text-center text-muted py-3">No items loaded yet.</td>
    </tr>`;
    return;
  }

  demandItems.forEach((item, i) => {
    tbody.innerHTML += `
      <tr>
        <td style="min-width:120px;">
          <input type="text" class="form-control form-control-sm bg-light"
                 value="${item.sku}" readonly>
        </td>
        <td style="min-width:180px;">
          <input type="text" class="form-control form-control-sm bg-light"
                 value="${item.name}" readonly>
        </td>
        <td>
          <input type="text" class="form-control form-control-sm bg-light"
                 value="${item.unit}" readonly>
        </td>
        <td>
          <input type="number" class="form-control form-control-sm"
                 value="${item.requested_qty}" min="0"
                 oninput="demandItems[${i}].requested_qty=parseInt(this.value)||0">
        </td>
        <td>
          <input type="number" class="form-control form-control-sm bg-light"
                 value="${item.available_stock}" readonly>
        </td>
        <td>
          <input type="number" class="form-control form-control-sm bg-light"
                 value="${item.consumption}" readonly>
        </td>
        <td>
          <input type="text" class="form-control form-control-sm"
                 value="${item.remarks}"
                 oninput="demandItems[${i}].remarks=this.value"
                 placeholder="Remarks">
        </td>
        <td>
          <button class="btn btn-sm btn-danger"
                  onclick="demandItems.splice(${i},1); renderTable();">
            <i class="bi bi-x"></i>
          </button>
        </td>
      </tr>
    `;
  });
}

function downloadSample() {
  const csv = "BarCode,Item Name,Requested Qty,Remarks\nSKU001,Sample Item,10,\n";
  const blob = new Blob([csv], { type: "text/csv" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "demand_sheet_sample.csv";
  a.click();
}

function saveDemand() {
  if (demandItems.length === 0) {
    alert("Please add at least one item.");
    return;
  }

  const hasRequested = demandItems.some(i => i.requested_qty > 0);
  if (!hasRequested) {
    alert("Please enter requested quantity for at least one item.");
    return;
  }

  fetch("{% url 'demand_sheet_create' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie("csrftoken"),
    },
    body: JSON.stringify({
      description: document.getElementById("description").value,
      from_date:   document.getElementById("fromDate").value || null,
      to_date:     document.getElementById("toDate").value || null,
      items:       demandItems,
    }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert("Demand sheet saved successfully.");
      window.location.href = "{% url 'demand_sheet_list' %}";
    } else {
      alert("Error: " + data.error);
    }
  });
}

function getCookie(name) {
  let value = null;
  document.cookie.split(";").forEach(c => {
    c = c.trim();
    if (c.startsWith(name + "="))
      value = decodeURIComponent(c.substring(name.length + 1));
  });
  return value;
}
</script>

{% endblock %}
