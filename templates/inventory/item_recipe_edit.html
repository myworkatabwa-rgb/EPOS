{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">
  <h5 class="mb-1 fw-semibold">
    Edit Recipe — {{ recipe.product.name }}
  </h5>
  <hr class="mt-1 mb-3"
      style="border-color:#ffc107;border-width:2px;width:60px;opacity:1;">

  <div class="card p-4">

    <div class="row mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Recipe Item</label>
        <input type="text" class="form-control bg-light"
               value="{{ recipe.product.name }}" readonly>
        <input type="hidden" id="productId"
               value="{{ recipe.product.id }}">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">SKU</label>
        <input type="text" class="form-control bg-light"
               value="{{ recipe.product.sku|default:'—' }}" readonly>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Current Yield Cost</label>
        <input type="text" class="form-control bg-light fw-bold text-success"
               value="PKR {{ recipe.yield_cost|floatformat:2 }}" readonly>
      </div>
    </div>

    <!-- SEARCH RAW MATERIAL -->
    <div class="card bg-light p-3 mb-4">
      <h6 class="fw-semibold mb-3">Add More Ingredients</h6>
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <input type="text" id="searchSku" class="form-control"
                 placeholder="Search by SKU..."
                 onkeydown="if(event.key==='Enter'){
                   event.preventDefault(); searchMaterial(); }">
        </div>
        <div class="col-md-3">
          <input type="text" id="searchName" class="form-control"
                 placeholder="Search by name...">
        </div>
        <div class="col-md-3">
          <select id="searchCategory" class="form-select">
            <option value="">Select Category</option>
            {% for c in categories %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100"
                  onclick="searchMaterial()">Search</button>
        </div>
      </div>
      <div id="searchResults" class="mt-3" style="display:none;">
        <table class="table table-sm table-bordered bg-white">
          <thead class="table-light">
            <tr>
              <th>SKU</th><th>Name</th><th>Unit</th>
              <th>Rate</th><th>Stock</th><th>Add</th>
            </tr>
          </thead>
          <tbody id="searchResultsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- INGREDIENTS TABLE -->
    <div class="table-responsive mb-3">
      <table class="table table-bordered align-middle"
             style="font-size:13px;">
        <thead style="background:#ffc107; color:#000; text-align:center;">
          <tr>
            <th>#</th>
            <th>BarCode</th>
            <th>Item Name</th>
            <th>Unit</th>
            <th>Actual Quantity</th>
            <th>Rate</th>
            <th>Amount</th>
            <th>Stop Recipe</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="ingredientsBody"></tbody>
        <tfoot>
          <tr class="fw-bold" style="background:#e8f5e9;">
            <td colspan="6" class="text-end">Yield Cost:</td>
            <td id="yieldCost" class="text-success fw-bold">
              PKR 0.00
            </td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-secondary" onclick="addEmptyRow()">
        + Add More
      </button>
    </div>

    <div>
      <button class="btn btn-warning px-5" onclick="saveRecipe()">
        Update Recipe
      </button>
      <a href="{% url 'item_recipe_detail' recipe.id %}"
         class="btn btn-secondary ms-2">Cancel</a>
    </div>

  </div>
</div>

<script>
// Pre-load existing ingredients
let ingredients = [
  {% for ing in ingredients %}
  {
    raw_material_id: {{ ing.raw_material.id|default:"null" }},
    sku:             "{{ ing.raw_material.sku|default:'' }}",
    name:            "{{ ing.raw_material.name|default:'' }}",
    unit:            "{{ ing.unit_name }}",
    actual_qty:      {{ ing.actual_qty }},
    rate:            {{ ing.rate }},
    stop_recipe:     {{ ing.stop_recipe|yesno:"true,false" }},
  },
  {% endfor %}
];

// Render on page load
renderTable();

function searchMaterial() {
  const sku   = document.getElementById("searchSku").value.trim();
  const name  = document.getElementById("searchName").value.trim();
  const catId = document.getElementById("searchCategory").value;

  let url = "{% url 'search_raw_material' %}?";
  if (sku)        url += `sku=${encodeURIComponent(sku)}`;
  else if (name)  url += `name=${encodeURIComponent(name)}`;
  else if (catId) url += `category_id=${catId}`;
  else { alert("Enter search term."); return; }

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const tbody = document.getElementById("searchResultsBody");
      tbody.innerHTML = "";
      data.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td>${p.sku}</td><td>${p.name}</td><td>${p.unit}</td>
            <td>PKR ${p.rate.toFixed(2)}</td><td>${p.stock}</td>
            <td>
              <button class="btn btn-sm btn-success"
                onclick="addIngredient(${p.id},'${p.sku}',
                  '${p.name.replace(/'/g,"\\'")}',
                  '${p.unit}',${p.rate})">
                + Add
              </button>
            </td>
          </tr>
        `;
      });
      document.getElementById("searchResults").style.display =
        data.length ? "block" : "none";
    });
}

function addIngredient(id, sku, name, unit, rate) {
  if (ingredients.find(i => i.raw_material_id === id)) {
    alert(`${name} already in recipe.`); return;
  }
  ingredients.push({
    raw_material_id: id, sku, name, unit,
    actual_qty: 1, rate, stop_recipe: false,
  });
  renderTable();
}

function addEmptyRow() {
  ingredients.push({
    raw_material_id: null, sku: "", name: "",
    unit: "Default", actual_qty: 0, rate: 0, stop_recipe: false,
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("ingredientsBody");
  tbody.innerHTML = "";
  let yieldCost = 0;

  ingredients.forEach((ing, i) => {
    const amount = ing.actual_qty * ing.rate;
    if (!ing.stop_recipe) yieldCost += amount;

    tbody.innerHTML += `
      <tr style="${ing.stop_recipe ? 'opacity:0.5;' : ''}">
        <td>${i + 1}</td>
        <td><input type="text" class="form-control form-control-sm bg-light"
             value="${ing.sku}" readonly></td>
        <td><input type="text" class="form-control form-control-sm bg-light"
             value="${ing.name}" readonly></td>
        <td><input type="text" class="form-control form-control-sm bg-light"
             style="width:80px;" value="${ing.unit}" readonly></td>
        <td>
          <input type="number" step="0.001"
                 class="form-control form-control-sm"
                 style="width:100px;" value="${ing.actual_qty}" min="0"
                 oninput="ingredients[${i}].actual_qty=
                          parseFloat(this.value)||0; renderTable();">
        </td>
        <td>
          <input type="number" step="0.01"
                 class="form-control form-control-sm"
                 style="width:100px;" value="${ing.rate}"
                 oninput="ingredients[${i}].rate=
                          parseFloat(this.value)||0; renderTable();">
        </td>
        <td class="fw-bold ${ing.stop_recipe ? 'text-muted' : 'text-success'}">
          PKR ${amount.toFixed(2)}
        </td>
        <td class="text-center">
          <input type="checkbox" class="form-check-input"
                 style="width:20px;height:20px;"
                 ${ing.stop_recipe ? 'checked' : ''}
                 onchange="ingredients[${i}].stop_recipe=
                           this.checked; renderTable();">
        </td>
        <td>
          <button class="btn btn-sm btn-danger"
                  onclick="ingredients.splice(${i},1); renderTable();">
            <i class="bi bi-x"></i>
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("yieldCost").textContent =
    `PKR ${yieldCost.toFixed(2)}`;
}

function saveRecipe() {
  const productId = document.getElementById("productId").value;
  if (!ingredients.length) {
    alert("Please add at least one ingredient."); return;
  }

  fetch("{% url 'item_recipe_create' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie("csrftoken"),
    },
    body: JSON.stringify({
      product_id:  productId,
      ingredients: ingredients,
    }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert("Recipe updated successfully.");
      window.location.href = "{% url 'item_recipe_list' %}";
    } else {
      alert("Error: " + data.error);
    }
  });
}

function getCookie(name) {
  let value = null;
  document.cookie.split(";").forEach(c => {
    c = c.trim();
    if (c.startsWith(name + "="))
      value = decodeURIComponent(c.substring(name.length + 1));
  });
  return value;
}
</script>

{% endblock %}
