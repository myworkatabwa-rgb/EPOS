{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">

  <h5 class="mb-1 fw-semibold">Stock Audit</h5>
  <hr class="mt-1 mb-3" style="border-color:#0d6efd; border-width:2px; width:60px; opacity:1;">

  <div class="card p-4">

    <!-- TOP INFO -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">User Name</label>
        <input type="text" class="form-control bg-light"
               value="{{ request.user.get_full_name|default:request.user.username }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Bill No</label>
        <input type="text" class="form-control bg-light" value="{{ bill_no }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="text" class="form-control bg-light" value="{{ today }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Total Audited Qty</label>
        <input type="text" id="totalQtyDisplay" class="form-control bg-light" value="0" readonly>
      </div>
    </div>

    <!-- BARCODE ROW -->
    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Add by barcode scan</label>
        <input type="text" id="barcodeInput" class="form-control"
               placeholder="place cursor here for Barcode Scan"
               onkeydown="if(event.key==='Enter'){ event.preventDefault(); addBarcode(); }">
      </div>
      <div class="col-md-2">
        <label class="form-label">Stock Quantity</label>
        <input type="number" id="stockQtyInput" class="form-control" value="1" min="1">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="addBarcode()">Load Items</button>
      </div>
    </div>

    <!-- EXCEL ROW -->
    <div class="row mb-4">
      <div class="col-md-3">
        <label class="form-label">Choose Excel File</label>
        <input type="file" id="excelFile" class="form-control" accept=".xlsx,.xls">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadFromExcel()">Load Records</button>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-info w-100" onclick="downloadSample()">Download Sample file</button>
      </div>
    </div>

    <!-- SUMMARY BADGES -->
    <div id="summarySection" style="display:none;" class="row mb-3">
      <div class="col-md-3">
        <div class="card text-center p-2 border-primary">
          <div class="text-muted" style="font-size:12px;">Total Items</div>
          <div class="fw-bold fs-5" id="summaryTotal">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-2 border-success">
          <div class="text-muted" style="font-size:12px;">Balanced</div>
          <div class="fw-bold fs-5 text-success" id="summaryBalanced">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-2 border-danger">
          <div class="text-muted" style="font-size:12px;">Short (Missing)</div>
          <div class="fw-bold fs-5 text-danger" id="summaryShort">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-2 border-warning">
          <div class="text-muted" style="font-size:12px;">Excess (Extra)</div>
          <div class="fw-bold fs-5 text-warning" id="summaryExcess">0</div>
        </div>
      </div>
    </div>

    <!-- ITEMS TABLE -->
    <div id="itemsSection" style="display:none;">
      <h6 class="fw-semibold mb-2">Scanned Items</h6>
      <div class="table-responsive mb-3">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Item</th>
              <th>Barcode</th>
              <th>Rate</th>
              <th>System Qty</th>
              <th>Audited Qty</th>
              <th>Difference</th>
              <th>Status</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody id="auditItemsBody"></tbody>
        </table>
      </div>

      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-primary" onclick="viewAudit()">View</button>
        <button class="btn btn-primary" onclick="downloadItems()">Download</button>
        <button class="btn btn-success" onclick="saveAudit()">Save</button>
      </div>
    </div>

    <div>
      <button class="btn btn-primary px-5" onclick="saveAudit()">Save</button>
    </div>

  </div>
</div>


<!-- VIEW MODAL -->
<div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Stock Audit Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="previewBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Back</button>
        <button class="btn btn-success" onclick="printPreview()">Print</button>
        <button class="btn btn-primary" onclick="saveAudit()">Save</button>
      </div>
    </div>
  </div>
</div>


<script>
let auditItems = [];

function updateSummary() {
  const total    = auditItems.length;
  const balanced = auditItems.filter(i => i.difference === 0).length;
  const short    = auditItems.filter(i => i.difference < 0).length;
  const excess   = auditItems.filter(i => i.difference > 0).length;
  const totalQty = auditItems.reduce((s, i) => s + i.audited_qty, 0);

  document.getElementById("summaryTotal").textContent    = total;
  document.getElementById("summaryBalanced").textContent = balanced;
  document.getElementById("summaryShort").textContent    = short;
  document.getElementById("summaryExcess").textContent   = excess;
  document.getElementById("totalQtyDisplay").value       = totalQty;

  document.getElementById("summarySection").style.display = total > 0 ? "flex" : "none";
}

function renderTable() {
  const tbody = document.getElementById("auditItemsBody");
  tbody.innerHTML = "";

  auditItems.forEach((item, i) => {
    const diff = item.audited_qty - item.system_qty;
    item.difference = diff;

    let statusBadge = "";
    let diffDisplay = "";

    if (diff === 0) {
      statusBadge = '<span class="badge bg-success">Balanced</span>';
      diffDisplay = '<span class="text-success fw-bold">0</span>';
    } else if (diff < 0) {
      statusBadge = '<span class="badge bg-danger">Short</span>';
      diffDisplay = `<span class="text-danger fw-bold">${diff}</span>`;
    } else {
      statusBadge = '<span class="badge bg-warning text-dark">Excess</span>';
      diffDisplay = `<span class="text-warning fw-bold">+${diff}</span>`;
    }

    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${item.name}</td>
        <td>${item.sku}</td>
        <td>${item.rate.toFixed(2)}</td>
        <td class="text-center">
          <span class="badge bg-secondary">${item.system_qty}</span>
        </td>
        <td>
          <input type="number" class="form-control form-control-sm text-center"
                 style="width:80px;"
                 value="${item.audited_qty}" min="0"
                 onchange="updateAuditedQty(${i}, this.value)">
        </td>
        <td class="text-center">${diffDisplay}</td>
        <td>${statusBadge}</td>
        <td>
          <button class="btn btn-sm btn-danger" onclick="removeItem(${i})">
            <i class="bi bi-x"></i>
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("itemsSection").style.display =
    auditItems.length > 0 ? "block" : "none";
  updateSummary();
}

function updateAuditedQty(index, val) {
  auditItems[index].audited_qty = parseInt(val) || 0;
  auditItems[index].difference  = auditItems[index].audited_qty - auditItems[index].system_qty;
  renderTable();
}

function removeItem(index) {
  auditItems.splice(index, 1);
  renderTable();
}

function addBarcode() {
  const sku = document.getElementById("barcodeInput").value.trim();
  const qty = parseInt(document.getElementById("stockQtyInput").value) || 1;

  if (!sku) { alert("Please enter a barcode."); return; }

  fetch(`/inventory/fetch-product-barcode/?sku=${encodeURIComponent(sku)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.success) {
        alert("Product not found: " + sku);
        return;
      }

      const existing = auditItems.find(i => i.sku === sku);
      if (existing) {
        existing.audited_qty += qty;
        existing.difference   = existing.audited_qty - existing.system_qty;
      } else {
        auditItems.push({
          product_id:  data.product_id,
          name:        data.name,
          sku:         data.sku,
          rate:        data.rate,
          system_qty:  data.system_qty,
          audited_qty: qty,
          difference:  qty - data.system_qty,
        });
      }

      document.getElementById("barcodeInput").value  = "";
      document.getElementById("stockQtyInput").value = 1;
      renderTable();
    })
    .catch(err => {
      alert("Error fetching product.");
      console.error(err);
    });
}

function viewAudit() {
  if (auditItems.length === 0) { alert("No items to preview."); return; }

  const billNo   = "{{ bill_no }}";
  const today    = "{{ today }}";
  const user     = "{{ request.user.get_full_name|default:request.user.username }}";
  const totalQty = auditItems.reduce((s, i) => s + i.audited_qty, 0);

  let rows = auditItems.map(item => {
    const diff  = item.difference;
    const color = diff === 0 ? "#28a745" : diff < 0 ? "#dc3545" : "#ffc107";
    const label = diff === 0 ? "Balanced" : diff < 0 ? `Short (${diff})` : `Excess (+${diff})`;
    return `
      <tr>
        <td style="padding:6px 10px;">${item.sku}</td>
        <td style="padding:6px 10px;">${item.name}</td>
        <td style="text-align:center; padding:6px 10px;">${item.system_qty}</td>
        <td style="text-align:center; padding:6px 10px;">${item.audited_qty}</td>
        <td style="text-align:center; padding:6px 10px; color:${color}; font-weight:bold;">${label}</td>
      </tr>
    `;
  }).join("");

  document.getElementById("previewBody").innerHTML = `
    <div style="font-family:Arial,sans-serif; padding:20px;">
      <div style="display:flex; justify-content:space-between; align-items:center;
                  border-bottom:2px solid #ccc; padding-bottom:12px; margin-bottom:12px;">
        <img src="/static/media/logo-1.jpeg" height="60" alt="Logo">
        <h2 style="margin:0;">Stock Audit</h2>
      </div>
      <div style="text-align:right; font-size:13px; margin-bottom:16px;">
        <div>Bill Number: ${billNo}</div>
        <div>Bill Date: ${today}</div>
        <div>User: ${user}</div>
      </div>
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr style="background:#1a7fe8; color:white; text-align:center;">
            <th style="padding:8px;">BAR CODE</th>
            <th style="padding:8px;">ITEM NAME</th>
            <th style="padding:8px;">SYSTEM QTY</th>
            <th style="padding:8px;">AUDITED QTY</th>
            <th style="padding:8px;">STATUS</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="font-weight:bold; border-top:2px solid #ccc;">
            <td colspan="3" style="padding:6px 10px;">Total Audited</td>
            <td style="text-align:center; padding:6px 10px;">${totalQty}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <div style="margin-top:20px;"><strong>Remarks</strong><hr></div>
      <div style="display:flex; justify-content:space-between; margin-top:20px;
                  font-size:11px; color:#888;">
        <span>Powered by CIS website:www.cisepos.com</span>
        <span>info@cisepos.com</span>
      </div>
    </div>
  `;

  new bootstrap.Modal(document.getElementById("viewModal")).show();
}

function printPreview() {
  const content = document.getElementById("previewBody").innerHTML;
  const win = window.open('', '_blank', 'width=800,height=600');
  win.document.write(`
    <html><head><title>Stock Audit</title>
    <style>body{font-family:Arial,sans-serif;padding:20px;}
    @media print{button{display:none;}}</style>
    </head><body>${content}
    <br><button onclick="window.print()">Print</button>
    </body></html>
  `);
  win.document.close();
}

function downloadItems() {
  if (auditItems.length === 0) { alert("No items."); return; }
  let csv = "Item,Barcode,Rate,System Qty,Audited Qty,Difference,Status\n";
  auditItems.forEach(i => {
    const status = i.difference === 0 ? "Balanced" : i.difference < 0 ? "Short" : "Excess";
    csv += `"${i.name}","${i.sku}",${i.rate},${i.system_qty},${i.audited_qty},${i.difference},${status}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "stock_audit.csv";
  a.click();
}

function downloadSample() {
  const csv = "Barcode,Qty\nSKU001,5\nSKU002,10\n";
  const blob = new Blob([csv], { type: "text/csv" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "stock_audit_sample.csv";
  a.click();
}

function loadFromExcel() {
  alert("Excel import coming soon.");
}

function saveAudit() {
  if (auditItems.length === 0) { alert("No items to save."); return; }

  fetch("{% url 'stock_audit_create' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie("csrftoken"),
    },
    body: JSON.stringify({ items: auditItems }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert("Stock audit saved successfully.");
      window.location.href = "{% url 'stock_audit_list' %}";
    } else {
      alert("Error: " + data.error);
    }
  });
}

function getCookie(name) {
  let value = null;
  document.cookie.split(";").forEach(c => {
    c = c.trim();
    if (c.startsWith(name + "="))
      value = decodeURIComponent(c.substring(name.length + 1));
  });
  return value;
}
</script>

{% endblock %}
