{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid">

  <h5 class="mb-1 fw-semibold">Stock Audit</h5>
  <hr class="mt-1 mb-3" style="border-color:#0d6efd; border-width:2px; width:60px; opacity:1;">

  <div class="card p-4">

    <!-- TOP INFO -->
    <div class="row mb-3">
      <div class="col-md-3">
        <label class="form-label">User Name</label>
        <input type="text" class="form-control bg-light"
               value="{{ request.user.get_full_name|default:request.user.username }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Bill No</label>
        <input type="text" class="form-control bg-light" value="{{ bill_no }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="text" class="form-control bg-light" value="{{ today }}" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Total Quantity</label>
        <input type="text" id="totalQtyDisplay" class="form-control bg-light" value="0" readonly>
      </div>
    </div>

    <!-- BARCODE ROW -->
    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Add by barcode scan</label>
        <input type="text" id="barcodeInput" class="form-control"
               placeholder="place cursor here for Barcode Scan"
               onkeydown="if(event.key==='Enter'){ event.preventDefault(); addBarcode(); }">
      </div>
      <div class="col-md-2">
        <label class="form-label">Stock Quantity</label>
        <input type="number" id="stockQtyInput" class="form-control" value="1" min="1">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="addBarcode()">Load Items</button>
      </div>
    </div>

    <!-- EXCEL ROW -->
    <div class="row mb-4">
      <div class="col-md-3">
        <label class="form-label">Choose Excel File</label>
        <input type="file" id="excelFile" class="form-control" accept=".xlsx,.xls">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadFromExcel()">Load Records</button>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-info w-100" onclick="downloadSample()">Download Sample file</button>
      </div>
    </div>

    <!-- ITEMS TABLE — hidden until items added -->
    <div id="itemsSection" style="display:none;">
      <h6 class="fw-semibold mb-2">Last 10 Barcode</h6>
      <div class="table-responsive mb-3">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>Item</th>
              <th>Barcode</th>
              <th>Rate</th>
              <th>Qty</th>
            </tr>
          </thead>
          <tbody id="auditItemsBody"></tbody>
        </table>
      </div>

      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-primary" onclick="viewAudit()">View</button>
        <button class="btn btn-primary" onclick="downloadItems()">Download Upload Item</button>
        <button class="btn btn-primary" onclick="saveAudit()">Save</button>
      </div>
    </div>

    <!-- SAVE always visible -->
    <div>
      <button class="btn btn-primary px-5" onclick="saveAudit()">Save</button>
    </div>

  </div>
</div>


<!-- VIEW MODAL -->
<div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Stock Audit Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="previewBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Back</button>
        <button class="btn btn-success" onclick="printPreview()">Print</button>
        <button class="btn btn-primary" onclick="saveAudit()">Save</button>
      </div>
    </div>
  </div>
</div>


<script>
let auditItems = [];

function updateTotalQty() {
  const total = auditItems.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById("totalQtyDisplay").value = total;
}

function renderTable() {
  const tbody  = document.getElementById("auditItemsBody");
  const last10 = auditItems.slice(-10).reverse();
  tbody.innerHTML = "";

  last10.forEach((item) => {
    const realIndex = auditItems.lastIndexOf(item);
    tbody.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.sku}</td>
        <td>${item.rate.toFixed(2)}</td>
        <td>
          <input type="number" class="form-control form-control-sm" style="width:80px;"
                 value="${item.qty}" min="1"
                 onchange="updateQty(${realIndex}, this.value)">
        </td>
      </tr>
    `;
  });

  document.getElementById("itemsSection").style.display =
    auditItems.length > 0 ? "block" : "none";
  updateTotalQty();
}

function updateQty(index, val) {
  auditItems[index].qty = parseInt(val) || 1;
  updateTotalQty();
}

// Called when user types barcode and clicks "Load Items" or presses Enter
function addBarcode() {
  const sku = document.getElementById("barcodeInput").value.trim();
  const qty = parseInt(document.getElementById("stockQtyInput").value) || 1;

  if (!sku) {
    alert("Please enter a barcode.");
    return;
  }

  fetch(`/inventory/fetch-product-barcode/?sku=${encodeURIComponent(sku)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.success) {
        alert("Product not found for barcode: " + sku);
        return;
      }

      // If already exists, increase qty
      const existing = auditItems.find(i => i.sku === sku);
      if (existing) {
        existing.qty += qty;
      } else {
        auditItems.push({
          product_id: data.product_id,
          name:       data.name,
          sku:        data.sku,
          rate:       data.rate,
          qty:        qty,
        });
      }

      document.getElementById("barcodeInput").value    = "";
      document.getElementById("stockQtyInput").value   = 1;
      renderTable();
    })
    .catch(err => {
      alert("Error fetching product.");
      console.error(err);
    });
}

function viewAudit() {
  if (auditItems.length === 0) { alert("No items to preview."); return; }

  const billNo   = "{{ bill_no }}";
  const today    = "{{ today }}";
  const user     = "{{ request.user.get_full_name|default:request.user.username }}";
  const totalQty = auditItems.reduce((s, i) => s + i.qty, 0);

  let rows = auditItems.map(item => `
    <tr>
      <td style="padding:6px 10px;">${item.sku}</td>
      <td style="text-align:right; padding:6px 10px;">${item.name}</td>
      <td style="text-align:right; padding:6px 10px;">${item.qty}</td>
    </tr>
  `).join("");

  document.getElementById("previewBody").innerHTML = `
    <div style="font-family:Arial,sans-serif; padding:20px;">
      <div style="display:flex; justify-content:space-between; align-items:center;
                  border-bottom:2px solid #ccc; padding-bottom:12px; margin-bottom:12px;">
        <img src="/static/media/logo-1.jpeg" height="60" alt="Logo">
        <h2 style="margin:0;">Stock Audit</h2>
      </div>
      <div style="text-align:right; font-size:13px; margin-bottom:16px;">
        <div>Branch: Main Branch</div>
        <div>Bill Number: ${billNo}</div>
        <div>Bill Date: ${today}</div>
        <div>User: ${user}</div>
      </div>
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr style="background:#1a7fe8; color:white; text-align:center;">
            <th style="padding:8px;">BAR CODE</th>
            <th style="padding:8px;">ITEM NAME</th>
            <th style="padding:8px;">QUANTITY</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="font-weight:bold; border-top:2px solid #ccc;">
            <td colspan="2" style="padding:6px 10px;">Total</td>
            <td style="text-align:right; padding:6px 10px;">${totalQty}.00</td>
          </tr>
        </tfoot>
      </table>
      <div style="margin-top:20px;"><strong>Remarks</strong><hr></div>
      <div style="display:flex; justify-content:space-between; margin-top:20px;
                  font-size:11px; color:#888;">
        <span>Powered by CIS website:www.cisepos.com</span>
        <span>info@cisepos.com</span>
      </div>
    </div>
  `;

  new bootstrap.Modal(document.getElementById("viewModal")).show();
}

function printPreview() {
  const content = document.getElementById("previewBody").innerHTML;
  const win = window.open('', '_blank', 'width=800,height=600');
  win.document.write(`
    <html><head><title>Stock Audit</title>
    <style>body{font-family:Arial,sans-serif;padding:20px;}
    @media print{button{display:none;}}</style>
    </head><body>${content}
    <br><button onclick="window.print()">Print</button>
    </body></html>
  `);
  win.document.close();
}

function downloadItems() {
  if (auditItems.length === 0) { alert("No items."); return; }
  let csv = "Item,Barcode,Rate,Qty\n";
  auditItems.forEach(i => {
    csv += `"${i.name}","${i.sku}",${i.rate},${i.qty}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "stock_audit_items.csv";
  a.click();
}

function downloadSample() {
  const csv = "Item,Barcode,Rate,Qty\nSample Item,SKU001,100.00,1\n";
  const blob = new Blob([csv], { type: "text/csv" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = "stock_audit_sample.csv";
  a.click();
}

function saveAudit() {
  if (auditItems.length === 0) { alert("No items to save."); return; }

  fetch("{% url 'stock_audit_create' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie("csrftoken"),
    },
    body: JSON.stringify({ items: auditItems }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert("Stock audit saved successfully.");
      window.location.href = "{% url 'stock_audit_list' %}";
    } else {
      alert("Error: " + data.error);
    }
  });
}

function getCookie(name) {
  let value = null;
  document.cookie.split(";").forEach(c => {
    c = c.trim();
    if (c.startsWith(name + "="))
      value = decodeURIComponent(c.substring(name.length + 1));
  });
  return value;
}
</script>

{% endblock %}
